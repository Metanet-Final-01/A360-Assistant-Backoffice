AWSTemplateFormatVersion: "2010-09-09"
Description: A360 Assistant network stack - public, application, backoffice, and isolated database subnets.

Parameters:
  ProjectName:
    Type: String
    Default: a360-assistant
  Environment:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
  Owner:
    Type: String
    Default: team1
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnetAzACidr:
    Type: String
    Default: 10.0.1.0/24
  PublicSubnetAzBCidr:
    Type: String
    Default: 10.0.2.0/24
  PrivateAppSubnetAzACidr:
    Type: String
    Default: 10.0.11.0/24
  PrivateAppSubnetAzBCidr:
    Type: String
    Default: 10.0.12.0/24
  PrivateBackofficeSubnetAzACidr:
    Type: String
    Default: 10.0.21.0/24
  PrivateBackofficeSubnetAzBCidr:
    Type: String
    Default: 10.0.22.0/24
  PrivateDbSubnetAzACidr:
    Type: String
    Default: 10.0.31.0/24
  PrivateDbSubnetAzBCidr:
    Type: String
    Default: 10.0.32.0/24
  EnableVpcFlowLogs:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  FlowLogRetentionDays:
    Type: Number
    Default: 14

Conditions:
  EnableFlowLogs: !Equals [!Ref EnableVpcFlowLogs, "true"]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation
        - Key: Owner
          Value: !Ref Owner

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetAzA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetAzACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-a"

  PublicSubnetAzB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetAzBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-b"

  PrivateAppSubnetAzA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateAppSubnetAzACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app-a"

  PrivateAppSubnetAzB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateAppSubnetAzBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app-b"

  PrivateBackofficeSubnetAzA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateBackofficeSubnetAzACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backoffice-a"

  PrivateBackofficeSubnetAzB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateBackofficeSubnetAzBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backoffice-b"

  PrivateDbSubnetAzA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateDbSubnetAzACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-db-a"

  PrivateDbSubnetAzB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateDbSubnetAzBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-db-b"

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetAzA
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat-a"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-rt"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateAppRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-app-rt"

  PrivateAppDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateAppRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateBackofficeRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-backoffice-rt"

  PrivateBackofficeDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateBackofficeRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateDbRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-db-rt"

  PublicSubnetAzARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetAzA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetAzBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetAzB
      RouteTableId: !Ref PublicRouteTable

  PrivateAppSubnetAzARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetAzA
      RouteTableId: !Ref PrivateAppRouteTable

  PrivateAppSubnetAzBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateAppSubnetAzB
      RouteTableId: !Ref PrivateAppRouteTable

  PrivateBackofficeSubnetAzARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateBackofficeSubnetAzA
      RouteTableId: !Ref PrivateBackofficeRouteTable

  PrivateBackofficeSubnetAzBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateBackofficeSubnetAzB
      RouteTableId: !Ref PrivateBackofficeRouteTable

  PrivateDbSubnetAzARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetAzA
      RouteTableId: !Ref PrivateDbRouteTable

  PrivateDbSubnetAzBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateDbSubnetAzB
      RouteTableId: !Ref PrivateDbRouteTable

  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnableFlowLogs
    Properties:
      LogGroupName: !Sub "/a360/${Environment}/vpc-flow-logs"
      RetentionInDays: !Ref FlowLogRetentionDays

  FlowLogRole:
    Type: AWS::IAM::Role
    Condition: EnableFlowLogs
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-vpc-flow-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !GetAtt FlowLogGroup.Arn

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: EnableFlowLogs
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogGroup
      ResourceId: !Ref Vpc
      ResourceType: VPC
      TrafficType: ALL

Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub "${ProjectName}-${Environment}-VpcId"
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnetAzA, !Ref PublicSubnetAzB]]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PublicSubnetIds"
  PrivateAppSubnetIds:
    Value: !Join [",", [!Ref PrivateAppSubnetAzA, !Ref PrivateAppSubnetAzB]]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PrivateAppSubnetIds"
  PrivateBackofficeSubnetIds:
    Value: !Join [",", [!Ref PrivateBackofficeSubnetAzA, !Ref PrivateBackofficeSubnetAzB]]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PrivateBackofficeSubnetIds"
  PrivateDbSubnetIds:
    Value: !Join [",", [!Ref PrivateDbSubnetAzA, !Ref PrivateDbSubnetAzB]]
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PrivateDbSubnetIds"
