AWSTemplateFormatVersion: "2010-09-09"
Description: A360 Assistant operator access stack - AWS Client VPN for private backoffice access.

Parameters:
  ProjectName:
    Type: String
    Default: a360-assistant
  Environment:
    Type: String
    Default: dev
  EnableClientVpn:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ClientVpnCidr:
    Type: String
    Default: 10.250.0.0/22
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  ServerCertificateArn:
    Type: String
    Default: ""
  RootCertificateChainArn:
    Type: String
    Default: ""
  VpnLogRetentionDays:
    Type: Number
    Default: 14

Conditions:
  ClientVpnEnabled: !Equals [!Ref EnableClientVpn, "true"]

Resources:
  ClientVpnLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ClientVpnEnabled
    Properties:
      LogGroupName: !Sub "/a360/${Environment}/client-vpn"
      RetentionInDays: !Ref VpnLogRetentionDays

  ClientVpnLogStream:
    Type: AWS::Logs::LogStream
    Condition: ClientVpnEnabled
    Properties:
      LogGroupName: !Ref ClientVpnLogGroup
      LogStreamName: connections

  ClientVpnEndpoint:
    Type: AWS::EC2::ClientVpnEndpoint
    Condition: ClientVpnEnabled
    Properties:
      ClientCidrBlock: !Ref ClientVpnCidr
      ServerCertificateArn: !Ref ServerCertificateArn
      AuthenticationOptions:
        - Type: certificate-authentication
          MutualAuthentication:
            ClientRootCertificateChainArn: !Ref RootCertificateChainArn
      ConnectionLogOptions:
        Enabled: true
        CloudwatchLogGroup: !Ref ClientVpnLogGroup
        CloudwatchLogStream: !Ref ClientVpnLogStream
      SplitTunnel: true
      TransportProtocol: udp
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-VpcId"

  ClientVpnAssociationAzA:
    Type: AWS::EC2::ClientVpnTargetNetworkAssociation
    Condition: ClientVpnEnabled
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      SubnetId:
        Fn::Select:
          - 0
          - Fn::Split:
              - ","
              - Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-PrivateBackofficeSubnetIds"

  ClientVpnAssociationAzB:
    Type: AWS::EC2::ClientVpnTargetNetworkAssociation
    Condition: ClientVpnEnabled
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      SubnetId:
        Fn::Select:
          - 1
          - Fn::Split:
              - ","
              - Fn::ImportValue:
                  Fn::Sub: "${ProjectName}-${Environment}-PrivateBackofficeSubnetIds"

  ClientVpnAuthorization:
    Type: AWS::EC2::ClientVpnAuthorizationRule
    Condition: ClientVpnEnabled
    Properties:
      ClientVpnEndpointId: !Ref ClientVpnEndpoint
      TargetNetworkCidr: !Ref VpcCidr
      AuthorizeAllGroups: true

Outputs:
  ClientVpnEndpointId:
    Condition: ClientVpnEnabled
    Value: !Ref ClientVpnEndpoint
    Export:
      Name: !Sub "${ProjectName}-${Environment}-ClientVpnEndpointId"
