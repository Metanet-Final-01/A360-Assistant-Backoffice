# CodeRabbit AI 리뷰 설정 — https://docs.coderabbit.ai/reference/configuration
# 방침: 빠르게, 필수만. 실제 버그·보안·계약 위반 위주. 정적 린터는 CI가 담당하므로 끔.
# (A360-Assistant-Backend의 설정과 동일 방침 — 세 리포 리뷰 기준을 통일한다.)
language: "ko-KR"

tone_instructions: "항상 한국어로만. 실제 버그·보안·데이터 계약 위반만 지적하고, 스타일·사소한 개선은 생략한다. 간결하게."

reviews:
  profile: "chill"          # 노이즈 최소
  request_changes_workflow: false
  high_level_summary: false # 요약 생성 생략 (속도)
  poem: false
  sequence_diagrams: false
  changed_files_summary: false
  review_status: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    # ⚠️ 기본값은 기본 브랜치(main)만 리뷰 — 우리는 dev로 PR을 보내므로 dev를 넣어야
    # dev 대상 PR이 스킵되지 않는다(이 설정이 없어 백오피스 PR 리뷰가 스킵됐음).
    base_branches:
      - "dev"
      - "main"
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  # 수정된 파일은 전부 리뷰한다 — 차단목록 방식. 코드·설정·스크립트·테스트·문서(md) 모두
  # 리뷰 대상. 데이터 덤프(data/)와 로컬 관측 JSONL만 제외. md는 아래 path_instructions로
  # "코드가 소스일 수 있음"을 전제로 리뷰하게 한다.
  path_filters:
    - "!**/data/**"
    - "!**/*.jsonl"
  path_instructions:
    - path: "ops-server/backend/app/observability/**"
      instructions: >-
        실서비스 백엔드(A360-Assistant-Backend)를 관측하는 클라이언트다. 원칙:
        (1) 실서비스/관측 DB에 직접 붙지 말 것 — 반드시 백엔드 admin API 경유(A안).
        (2) 자격증명(관리자 비번·OPS_API_KEY)은 로그·응답·예외에 노출 금지, 토큰은
        디스크 미기록. (3) 수집은 읽기 전용 — INSERT/UPDATE/DELETE 추가 금지.
        (4) 백엔드 응답 스키마와의 필드 계약(request-metrics·audit·rollup) 어긋남만 지적.
    - path: "ops-server/frontend/**"
      instructions: >-
        Streamlit UI. 시크릿을 화면·URL 쿼리에 싣지 말 것. 백엔드 호출 실패를
        사용자에게 명확한 상태로 보여주는지(조용한 실패 금지) 위주로 본다.
    - path: "rag-server/**"
      instructions: >-
        RAG 적재 파이프라인. 적재(쓰기)는 이 목적의 코드에만. 외부 크롤링 입력
        신뢰 금지(SSRF/경로 조작). 자격증명 하드코딩 금지.
    - path: "**/*.py"
      instructions: >-
        시크릿 하드코딩 금지. 외부 입력(업로드·URL·쿼리·크롤링) 신뢰 금지(SSRF/인젝션).
        .env는 커밋 금지 — .env.example엔 키 이름만.
    - path: "**/*.md"
      instructions: >-
        문서(md) 리뷰: **코드/구현이 소스 오브 트루스일 수 있다.** 문서가 코드와
        어긋나면 "문서가 틀렸다"고 단정하지 말고, 실제 코드(엔드포인트·필드명·계약·
        기본값)와의 **불일치를 짚어 어느 쪽이 최신인지 사람이 판단하게** 한다.
        오탈자·문장 스타일·표현 개선은 생략(노이즈).
  # 정적 분석 도구는 CI(gitleaks 등)가 담당 → CodeRabbit에서는 꺼서 속도 확보
  # (CodeRabbit v2 스키마: tools는 reviews 하위. 최상위에 두면 통째로 무시됨)
  tools:
    ruff:
      enabled: false
    hadolint:
      enabled: false
    gitleaks:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    languagetool:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false

chat:
  auto_reply: true
