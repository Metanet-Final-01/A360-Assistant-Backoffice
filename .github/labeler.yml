# PR 변경 파일 경로 → 영역 라벨 매핑 (.github/workflows/pr-labeler.yml이 사용)
# 여러 영역을 건드리면 라벨이 여러 개 붙는다 (의도된 동작 — PR 분리를 고민할 신호)

area:monitoring:
  - changed-files:
      - any-glob-to-any-file:
          - "ops-server/**"

area:rag:
  - changed-files:
      - any-glob-to-any-file:
          - "rag-server/**"

area:observability:
  - changed-files:
      - any-glob-to-any-file:
          - "ops-server/backend/app/observability/**"

area:eval:
  - changed-files:
      - any-glob-to-any-file:
          - "ops-server/backend/app/eval/**"

area:frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "ops-server/frontend/**"

area:docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
          - ".github/**"
