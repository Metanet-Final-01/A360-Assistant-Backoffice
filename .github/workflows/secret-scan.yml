# Private 리포는 GitHub 네이티브 Secret scanning이 유료라서 gitleaks로 대체
# 커밋 히스토리 전체에서 API 키·토큰·비밀번호 패턴을 탐지한다
# 백오피스는 관리자 크레덴셜·OPS_API_KEY·관측 DB URL을 다루므로 특히 중요하다
name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 체크아웃 토큰을 .git/config에 남기지 않는다 — 뒤의 gitleaks 도커 컨테이너
          # (-v $PWD:/repo)가 마운트된 저장소에서 토큰을 읽어 유출하는 것 방지(CodeRabbit #9).
          persist-credentials: false
      - name: Run gitleaks
        run: >
          docker run --rm -v "$PWD:/repo"
          zricethezav/gitleaks:v8.18.4
          detect --source /repo --redact --verbose
