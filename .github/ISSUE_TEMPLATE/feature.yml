name: "✨ 기능 개발"
description: "새 기능 또는 개선 작업"
title: "[feat] "
labels: ["type:feat"]
body:
  - type: input
    id: jira
    attributes:
      label: Jira 키
      placeholder: "RPA-120"
    validations:
      required: false
  - type: textarea
    id: what
    attributes:
      label: 무엇을 만들려고 하나요?
      description: 기능 요구사항 ID(FR-xx)가 있으면 함께 적어주세요.
      placeholder: "RAG 적재 주기 자동 트리거 — 스케줄러가 rag-server /rag/ingest 호출"
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 완료 조건 (Definition of Done)
      placeholder: |
        - [ ] RAG_INGEST_INTERVAL_MINUTES 주기로 자동 호출
        - [ ] 실패 시 다음 주기에 재시도 + 상태 표시
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - P0 (필수 기능과 한몸)
        - P1 (가점 효율)
        - P2 (차별화)
    validations:
      required: true
